<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shopping Cart</title>
</head>
<body>
<h1>Your Shopping Cart</h1>

<div th:if="${cart.products.empty}">
    <p>Your cart is empty.</p>
</div>

<table border="1" th:unless="${cart.products.empty}">
    <thead>
    <tr>
        <th>Item Name / Description</th>
        <th>Type</th>
        <th>Price</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="product : ${cart.products}">
        <td>
            <!-- Books / Magazines (PublicationEntity has 'title') -->
            <span th:if="${product instanceof T(csd230.bookstore.entities.PublicationEntity)}"
                  th:text="${product.title}"></span>

            <!-- Tickets (TicketEntity has 'description') -->
            <span th:if="${product instanceof T(csd230.bookstore.entities.TicketEntity)}"
                  th:text="${product.description}"></span>

            <!-- Computer Hardware: CPU / GPU (ComputerHardwareEntity has 'name') — NEW -->
            <span th:if="${product instanceof T(csd230.bookstore.entities.ComputerHardwareEntity)}"
                  th:text="${product.name}"></span>
        </td>

        <td th:text="${product.productType}"></td>
        <td th:text="${product.price}"></td>
        <td>
            <a th:href="@{/cart/remove/{id}(id=${product.id})}">Remove</a>
        </td>
    </tr>
    </tbody>
</table>

<br/>
<p>
    <a th:href="@{/books}">Continue Shopping</a>
</p>
</body>
</html>
